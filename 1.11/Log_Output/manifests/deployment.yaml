apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: dwk-pvc
      containers:
        - name: log-output-writer
          image: log-output-writer:1.11
          volumeMounts:
            - name: shared-storage
              mountPath: /usr/src/app/files
        - name: log-output-reader
          image: log-output-reader:1.11
          env:
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: shared-storage
              mountPath: /usr/src/app/files
